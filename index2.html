<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STREAK BOT | Setup Guide</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121212;
            --shadow-light: #1d1d1f;
            --shadow-dark: #050505;
            --accent-orange: #ff7e00;
            --apple-font: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: var(--apple-font);
            -webkit-font-smoothing: antialiased;
            color: #ffffff;
        }

        body::after {
            content: '';
            position: absolute;
            bottom: -150px;
            width: 100%;
            height: 450px;
            background: radial-gradient(50% 50% at 50% 100%, rgba(255, 126, 0, 0.08) 0%, transparent 100%);
            z-index: -1;
        }

        .container {
            width: 350px;
            padding: 50px 40px;
            border-radius: 48px;
            background: var(--bg-color);
            box-shadow: 25px 25px 50px var(--shadow-dark),
                       -12px -12px 40px var(--shadow-light);
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 40px;
            text-align: center;
        }

        .step-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .step-item {
            margin-bottom: 25px;
            line-height: 1.6;
            font-size: 16px;
            color: #d1d1d6;
            display: flex;
            align-items: flex-start;
        }

        .step-number {
            font-weight: 700;
            color: var(--accent-orange);
            margin-right: 12px;
        }

        /* Styl dla tekstów w nawiasach [] */
        .highlight {
            color: var(--accent-orange);
            background: rgba(255, 126, 0, 0.1);
            padding: 2px 6px;
            border-radius: 6px;
            font-weight: 600;
            text-shadow: 0 0 8px rgba(255, 126, 0, 0.3);
        }

        .btn-back {
            display: block;
            margin-top: 40px;
            text-align: center;
            color: #86868b;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }

        .btn-back:hover {
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Setup Guide</h1>
        
        <div class="step-list">
            <div class="step-item">
                <span class="step-number">1.</span>
                <span>Go to the server channel and type <span class="highlight">[/timezone]</span> to set your time zone.</span>
            </div>
            
            <div class="step-item">
                <span class="step-number">2.</span>
                <span>You can now use the bot.</span>
            </div>
        </div>

        <a href="index.html" class="btn-back">← Back to Home</a>
    </div>

</body>
</html>
