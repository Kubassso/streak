<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STREAK BOT | Setup Guide</title>

<link rel="preload" href="font.ttf" as="font" type="font/ttf" crossorigin>

<style>

@font-face {
    font-family: "StreakFont";
    src: url("font.ttf") format("truetype");
    font-display: swap;
}

:root{
    --bg-color:#121212;
    --shadow-light:#1d1d1f;
    --shadow-dark:#050505;
    --accent:#ff7e00;
    --main-font:"StreakFont", sans-serif;
}

body{
    background:var(--bg-color);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    font-family:var(--main-font);
    color:white;
}

.top-nav{
    position:absolute;
    top:25px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:10px;
    padding:8px;
    border-radius:30px;
    background:rgba(20,20,20,0.6);
    backdrop-filter:blur(10px);
}

.nav-item{
    color:#9a9a9a;
    text-decoration:none;
    font-size:14px;
    padding:8px 18px;
    border-radius:20px;
}

.nav-item.active{
    background:rgba(255,126,0,0.15);
    color:var(--accent);
}

.container{
    width:350px;
    padding:50px 40px;
    border-radius:48px;
    background:var(--bg-color);
    box-shadow:25px 25px 50px var(--shadow-dark),
               -12px -12px 40px var(--shadow-light);
}

h1{
    text-align:center;
    margin-bottom:40px;
    color: var(--accent); /* pomarańczowe */
    font-weight: normal;   /* zwykłe */
}

.step-item{
    margin-bottom:20px;
    color:#d1d1d6;
}

.step-number{
    color:var(--accent);
    font-weight:bold;
    margin-right:8px;
}

.orange-text {
    color: var(--accent);
    font-weight: normal;
    text-decoration: none; /* usuwa podkreślenie linka */
}

</style>
</head>

<body>

<div class="top-nav">
    <a href="index.html" class="nav-item">Setup</a>
    <a href="index2.html" class="nav-item active">Setup Guide</a>
</div>

<div class="container">

    <h1>Setup Guide</h1>

    <div class="step-item">
        <span class="step-number">1.</span>
        Go to the server channel and type <a class="orange-text">/timezone</a>
    </div>

    <div class="step-item">
        <span class="step-number">2.</span>
        You can now use the bot.
    </div>

</div>

</body>
</html>
