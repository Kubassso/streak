<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STREAK BOT</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121212;
            --shadow-light: #1d1d1f;
            --shadow-dark: #050505;
            --accent: #ff7e00;
            --apple-font: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: var(--apple-font);
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }

        /* Pomarańczowy glow z dołu */
        body::after {
            content: '';
            position: absolute;
            bottom: -150px;
            width: 100%;
            height: 450px;
            background: radial-gradient(50% 50% at 50% 100%, rgba(255, 126, 0, 0.08) 0%, transparent 100%);
            z-index: -1;
        }

        .container {
            width: 280px;
            padding: 50px;
            border-radius: 48px;
            background: var(--bg-color);
            box-shadow: 25px 25px 50px var(--shadow-dark),
                       -12px -12px 40px var(--shadow-light);
            text-align: center;
        }

        .logo-box {
            width: 110px;
            height: 110px;
            margin: 0 auto 35px;
            border-radius: 24px;
            background: var(--bg-color);
            box-shadow: inset 7px 7px 14px var(--shadow-dark),
                        inset -7px -7px 14px var(--shadow-light);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-box img {
            width: 70px;
            height: 70px;
        }

        h1 {
            color: #ffffff;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.8px;
            margin: 0 0 45px 0; /* Większy odstęp bezpośrednio pod nazwą */
        }

        .btn-setup {
            display: inline-block;
            padding: 16px 55px;
            font-size: 15px;
            font-weight: 600;
            color: #ffffff;
            text-decoration: none;
            border-radius: 30px;
            background: var(--bg-color);
            box-shadow: 8px 8px 16px var(--shadow-dark),
                        -6px -6px 16px var(--shadow-light);
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .btn-setup:hover {
            color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 10px 10px 20px var(--shadow-dark),
                        -8px -8px 20px var(--shadow-light);
        }

        .btn-setup:active {
            transform: scale(0.96);
            box-shadow: inset 5px 5px 10px var(--shadow-dark),
                        inset -5px -5px 10px var(--shadow-light);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-box">
            <img src="streak.png" alt="Logo">
        </div>
        <h1>Streak Bot</h1>
        <a href="https://discord.com/oauth2/authorize?client_id=1479511009898139688&permissions=8&integration_type=0&scope=bot" class="btn-setup">Setup</a>
    </div>

</body>
</html>
