<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STREAK BOT</title>

<link rel="preload" href="font.ttf" as="font" type="font/ttf" crossorigin>

<style>

@font-face {
    font-family: "StreakFont";
    src: url("font.ttf") format("truetype");
    font-weight: normal;
    font-style: normal;
    font-display: swap;
}

:root{
--bg-color:#121212;
--shadow-light:#1d1d1f;
--shadow-dark:#050505;
--accent:#ff7e00;
--main-font:"StreakFont", -apple-system, BlinkMacSystemFont, sans-serif;
}

body{
background-color:var(--bg-color);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
font-family:var(--main-font);
overflow:hidden;

-webkit-font-smoothing:antialiased;
-moz-osx-font-smoothing:grayscale;
text-rendering:optimizeLegibility;
}

body::after{
content:'';
position:absolute;
bottom:-150px;
width:100%;
height:450px;
background:radial-gradient(50% 50% at 50% 100%, rgba(255,126,0,0.08) 0%, transparent 100%);
z-index:-1;
}

.top-nav{
position:absolute;
top:25px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:10px;
padding:8px;
border-radius:30px;
background:rgba(20,20,20,0.6);
backdrop-filter:blur(10px);
}

.nav-item{
color:#9a9a9a;
text-decoration:none;
font-size:14px;
padding:8px 18px;
border-radius:20px;
transition:0.25s;
}

.nav-item:hover{
color:white;
}

.nav-item.active{
background:rgba(255,126,0,0.15);
color:var(--accent);
}

.container{
width:280px;
padding:50px;
border-radius:48px;
background:var(--bg-color);
box-shadow:25px 25px 50px var(--shadow-dark),
-12px -12px 40px var(--shadow-light);
text-align:center;
}

.logo-box{
width:110px;
height:110px;
margin:0 auto 35px;
border-radius:24px;
background:var(--bg-color);
box-shadow:inset 7px 7px 14px var(--shadow-dark),
inset -7px -7px 14px var(--shadow-light);
display:flex;
justify-content:center;
align-items:center;
}

.logo-box img{
width:70px;
}

h1{
color:white;
font-size:26px;
margin-bottom:45px;
}

.btn-setup{
display:inline-block;
padding:16px 55px;
font-size:15px;
color:white;
text-decoration:none;
border-radius:30px;
background:var(--bg-color);
box-shadow:8px 8px 16px var(--shadow-dark),
-6px -6px 16px var(--shadow-light);
transition:0.3s;
}

.btn-setup:hover{
color:var(--accent);
transform:translateY(-2px);
}

</style>
</head>

<body>

<div class="top-nav">
<a href="index.html" class="nav-item active">Setup</a>
<a href="index2.html" class="nav-item">Setup Guide</a>
</div>

<div class="container">

<div class="logo-box">
<img src="streak.png">
</div>

<h1>Streak Bot</h1>

<a href="https://discord.com/oauth2/authorize?client_id=1479511009898139688&permissions=8&integration_type=0&scope=bot" class="btn-setup">Setup</a>

</div>

</body>
</html>
